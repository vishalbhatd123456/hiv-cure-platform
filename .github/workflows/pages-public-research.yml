name: Deploy public research radar

on:
  push:
    branches:
      - main
    paths:
      - "apps/research-portal/public-research/**"
      - ".github/workflows/pages-public-research.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/research-portal/public-research

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
